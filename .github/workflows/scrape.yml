name: TenderRadar Scraper

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      portals:
        description: 'Portals to scrape (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scrapers + AI scoring
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          COMPANY_PROFILE:     ${{ secrets.COMPANY_PROFILE }}
          MIN_RELEVANCE_SCORE: ${{ secrets.MIN_RELEVANCE_SCORE || '6.0' }}
          PORTALS_OVERRIDE:    ${{ github.event.inputs.portals }}
        run: python scraper/main.py

      - name: Send alerts
        env:
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO:     ${{ secrets.ALERT_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          COMPANY_PROFILE:    ${{ secrets.COMPANY_PROFILE }}
        run: python scraper/alerts.py

      - name: Commit updated data
        run: |
          git config user.name  "TenderRadar Bot"
          git config user.email "tenderradar-bot@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: update tenders [$(date '+%Y-%m-%d %H:%M')] [skip ci]"
          git push
